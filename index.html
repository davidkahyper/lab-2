<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS BAYAN</title>

    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/media-and-animations.css" />
    <!-- <link rel="stylesheet" href="styles/debug.css" /> -->
  </head>
  <body>
    <div class="wrapper">
      <div class="bayan">
        <h1 class="title">CSS Bayan</h1>

        <label for="radio1-checkmark">
          <input
            class="radio"
            type="radio"
            id="radio1-checkmark"
            name="css-bayan"
            checked
          />
          <div class="bayan-row">
            <div class="text-div">
              <p class="text">Жиза жизненная</p>
              <div class="arrow-image-div arrow-border">
                <img class="arrow-image" src="images/arrow.svg" alt="" />
              </div>
            </div>
            <div class="meme-image-div">
              <img class="meme-image" src="images/meme1.jpg" alt="" />
            </div>
          </div>
        </label>

        <label for="radio2-checkmark">
          <input
            class="radio"
            type="radio"
            id="radio2-checkmark"
            name="css-bayan"
          />
          <div class="bayan-row">
            <div class="text-div">
              <p class="text">Котики собирают лайки</p>
              <div class="arrow-image-div arrow-border">
                <img class="arrow-image" src="images/arrow.svg" alt="" />
              </div>
            </div>
            <div class="meme-image-div">
              <img class="meme-image" src="images/meme2.png" alt="" />
            </div>
          </div>
        </label>

        <label for="radio3-checkmark">
          <input
            class="radio"
            type="radio"
            id="radio3-checkmark"
            name="css-bayan"
          />
          <div class="bayan-row">
            <div class="text-div">
              <p class="text">Я знаю, но не могу доказать это</p>
              <div class="arrow-image-div arrow-border">
                <img class="arrow-image" src="images/arrow.svg" alt="" />
              </div>
            </div>
            <div class="meme-image-div">
              <img class="meme-image" src="images/meme3.png" alt="" />
            </div>
          </div>
        </label>

        <label for="radio4-checkmark">
          <input
            class="radio"
            type="radio"
            id="radio4-checkmark"
            name="css-bayan"
          />
          <div class="bayan-row">
            <div class="text-div">
              <p class="text">Привет мой друг</p>
              <div class="arrow-image-div arrow-border">
                <img class="arrow-image" src="images/arrow.svg" alt="" />
              </div>
            </div>
            <div class="meme-image-div">
              <img class="meme-image" src="images/meme4.jpg" alt="" />
            </div>
          </div>
        </label>
      </div>
    </div>
  </body>
</html>
